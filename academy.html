<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Rizzolo · Knowledge Academy</title>
<style>
  :root {
    --bg: #13151a;
    --surface: #1a1d23;
    --surface2: #1e2128;
    --ink: #e8e8e8;
    --muted: #9aa1ab;
    --line: #2a2d35;
    --brand: #579bfc;
    --brand-dark: #a9c9ff;
    --accent: #1D9E75;
    --shadow: 0 1px 3px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font-size: 15px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; min-height: 100vh;
  }

  .academy-head {
    background: var(--surface); border-bottom: 1px solid var(--line);
    box-shadow: var(--shadow); flex-shrink: 0; padding: 18px 24px;
  }
  .academy-head h1 { margin: 0; font-size: 18px; letter-spacing: .2px; }
  .academy-head p { margin: 4px 0 0; color: var(--muted); font-size: 13.5px; }
  .top-tabs { display: flex; gap: 26px; margin-top: 14px; }
  .top-tabs button {
    appearance: none; border: none; background: none; font: inherit; font-weight: 700;
    color: var(--muted); padding: 8px 0; cursor: pointer; border-bottom: 3px solid transparent;
  }
  .top-tabs button:hover { color: var(--ink); }
  .top-tabs button.active { color: var(--brand-dark); border-bottom-color: var(--accent); }

  #view-trainer { flex: 1; display: none; }
  #view-trainer.show { display: flex; }
  #view-trainer iframe { flex: 1; width: 100%; border: none; min-height: 640px; background: var(--surface); }

  main { flex: 1; padding: 24px; max-width: 1100px; width: 100%; margin: 0 auto; }

  /* ── Category grid ── */
  .legend { font-size: 12.5px; color: var(--muted); margin: 0 0 16px; }
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .cat {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px; box-shadow: var(--shadow); cursor: pointer; display: flex; gap: 14px;
    transition: border-color .15s, transform .1s;
  }
  .cat:hover { border-color: var(--accent); transform: translateY(-1px); }
  .cat-ic {
    flex-shrink: 0; width: 42px; height: 42px; border-radius: 11px;
    background: var(--surface2); font-size: 21px;
    display: grid; place-items: center;
  }
  /* tier accents on cards */
  .cat.tier-found   { border-left: 3px solid #00c875; }
  .cat.tier-build   { border-left: 3px solid #579bfc; }
  .cat.tier-applied { border-left: 3px solid #e0a13a; }
  .cat.tier-adv     { border-left: 3px solid #ff5a5a; }
  /* tier section headers */
  .tier-section { margin-bottom: 24px; }
  .tier-header { display: flex; align-items: center; gap: 9px; font-size: 11.5px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }
  .tier-header .bar { width: 18px; height: 3px; border-radius: 2px; background: var(--muted); }
  .tier-header.tier-found   .bar { background: #00c875; }
  .tier-header.tier-build   .bar { background: #579bfc; }
  .tier-header.tier-applied .bar { background: #e0a13a; }
  .tier-header.tier-adv     .bar { background: #ff5a5a; }
  .cat .body h3 { margin: 0 0 3px; font-size: 15px; }
  .cat .body .desc { color: var(--muted); font-size: 13px; line-height: 1.45; margin: 0 0 8px; }
  .cat .body .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 999px;
  }
  .tag.type { background: #eef4f6; color: var(--brand); }
  .tag.tier-found { background: #ecfdf3; color: #18794e; }
  .tag.tier-build { background: #eff6ff; color: #1f6feb; }
  .tag.tier-applied { background: #fff7ed; color: #b54708; }
  .tag.tier-adv { background: #fef3f2; color: #b42318; }
  .tag.count { background: var(--bg); color: var(--muted); }

  /* ── Module shell ── */
  .back-link { background: none; border: none; color: var(--accent); font: inherit; font-weight: 700; cursor: pointer; padding: 0; margin-bottom: 16px; }
  .module-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .module-head h2 { margin: 0; font-size: 20px; }
  .module-head .sub { color: var(--muted); font-size: 13.5px; }
  .progress { font-size: 13px; color: var(--muted); font-weight: 600; margin-left: auto; }
  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); padding: 28px; max-width: 720px; }

  .btn { appearance: none; border: none; background: var(--brand); color: #fff; font: inherit; font-weight: 600; padding: 10px 18px; border-radius: 9px; cursor: pointer; }
  .btn.ghost { background: var(--surface); color: var(--brand); border: 1px solid var(--line); }
  .btn.good { background: var(--accent); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 18px; }

  /* Flashcard */
  .flash { perspective: 1000px; }
  .flash .face {
    min-height: 180px; border-radius: 12px; border: 1px solid var(--line);
    display: grid; place-items: center; text-align: center; padding: 28px; cursor: pointer;
    background: var(--bg);
  }
  .flash .term { font-size: 24px; font-weight: 800; color: var(--brand-dark); }
  .flash .def { font-size: 17px; line-height: 1.5; color: var(--ink); }
  .flip-hint { font-size: 12px; color: var(--muted); margin-top: 10px; text-align: center; }

  /* Flashcard STUDY mode — pile, flip, sort-into-piles */
  .fs-stats { display: flex; gap: 9px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
  .fs-pill { font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); }
  .fs-pill b { margin-left: 5px; }
  .fs-pill.knew { color: var(--accent); border-color: rgba(29,158,117,.5); background: rgba(29,158,117,.12); }
  .fs-pill.review { color: #d39a2e; border-color: rgba(211,154,46,.5); background: rgba(211,154,46,.12); }
  .fs-remain { margin-left: auto; font-size: 13px; color: var(--ink); font-weight: 800; }
  .fs-remain small { color: var(--muted); font-weight: 600; }
  .fs-deck { position: relative; perspective: 1300px; margin: 2px 0; }
  .fs-ghost { position: absolute; left: 0; right: 0; top: 0; height: 100%; border-radius: 14px; border: 1px solid var(--line); background: var(--bg); }
  .fs-ghost.g1 { transform: translateY(9px) scale(.972); opacity: .6; }
  .fs-ghost.g2 { transform: translateY(18px) scale(.944); opacity: .32; }
  .fs-card { position: relative; min-height: 210px; transform-style: preserve-3d; transition: transform .45s cubic-bezier(.2,.7,.2,1); cursor: pointer; }
  .fs-card.flip { transform: rotateY(180deg); }
  .fs-front, .fs-back { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; padding: 28px; border-radius: 14px; border: 1px solid var(--line); background: var(--surface); backface-visibility: hidden; -webkit-backface-visibility: hidden; box-shadow: var(--shadow); }
  .fs-back { transform: rotateY(180deg); }
  .fs-front .term { font-size: 25px; font-weight: 800; color: var(--brand-dark); }
  .fs-front .kind { position: absolute; top: 12px; left: 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  .fs-back .def { font-size: 17px; line-height: 1.5; color: var(--ink); }
  .fs-tag { position: absolute; bottom: 12px; left: 0; right: 0; font-size: 11px; color: var(--muted); }
  .fs-card.fly-right { animation: fsFlyR .34s ease forwards; }
  .fs-card.fly-left { animation: fsFlyL .34s ease forwards; }
  @keyframes fsFlyR { to { transform: translateX(62%) translateY(-9%) rotate(10deg); opacity: 0; } }
  @keyframes fsFlyL { to { transform: translateX(-62%) translateY(-9%) rotate(-10deg); opacity: 0; } }
  .fs-actions { justify-content: center; gap: 14px; margin-top: 24px; }
  .btn.bad-btn { background: var(--surface); color: #b8791e; border: 1px solid rgba(211,154,46,.55); }
  .fs-bar { height: 7px; border-radius: 5px; background: var(--bg); border: 1px solid var(--line); margin-top: 18px; overflow: hidden; }
  .fs-bar > span { display: block; height: 100%; background: var(--accent); transition: width .4s ease; }
  .fs-done { font-size: 21px; font-weight: 800; color: var(--brand-dark); text-align: center; margin: 4px 0 8px; }
  .fs-donesub { text-align: center; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

  /* Flashcards section — centered header, overall bar, 2-up level grid with meters */
  .flash-section .flash-head { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 2px; margin-bottom: 16px; }
  .flash-section .flash-head .mode-ic { width: 40px; height: 40px; display: grid; place-items: center; font-size: 22px; background: var(--surface); border: 1px solid var(--line); border-radius: 11px; margin-bottom: 4px; }
  .flash-section .flash-head .mode-title { font-size: 18px; font-weight: 800; color: var(--ink); }
  .flash-section .flash-head .mode-blurb { font-size: 12.5px; color: var(--muted); max-width: 460px; }
  .overall { max-width: 560px; margin: 0 auto 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .overall-row { display: flex; align-items: baseline; justify-content: space-between; font-size: 13px; font-weight: 700; color: var(--ink); }
  .overall-pct { color: var(--accent); font-size: 18px; font-weight: 800; }
  .overall-bar { height: 10px; border-radius: 6px; background: var(--bg); border: 1px solid var(--line); overflow: hidden; margin: 9px 0 7px; }
  .overall-bar > span { display: block; height: 100%; background: var(--accent); transition: width .45s ease; }
  .overall-sub { font-size: 12px; color: var(--muted); text-align: center; }
  .lvl-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; max-width: 620px; margin: 0 auto; }
  @media (max-width: 560px) { .lvl-grid { grid-template-columns: 1fr; } }
  .lvl-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 15px 16px; cursor: pointer; transition: border-color .12s, transform .12s; }
  .lvl-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .lvl-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .lvl-ic { font-size: 19px; }
  .lvl-card h3 { margin: 0 0 11px; font-size: 14.5px; color: var(--brand-dark); }
  .lvl-meter { height: 9px; border-radius: 5px; background: var(--bg); border: 1px solid var(--line); overflow: hidden; }
  .lvl-meter > span { display: block; height: 100%; background: var(--accent); transition: width .45s ease; }
  .lvl-stat { font-size: 12px; color: var(--muted); margin-top: 7px; }
  .lvl-done { color: var(--accent); font-weight: 700; }

  /* Team leaderboard (top of the Academy grid) */
  .lbx { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; max-width: 620px; margin: 0 auto 22px; }
  .lbx-head { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 10px; }
  .lbx-row { display: grid; grid-template-columns: auto 1fr auto; grid-template-rows: auto auto; column-gap: 12px; align-items: center; padding: 8px 6px; border-top: 1px solid var(--line); }
  .lbx-row:first-of-type { border-top: none; }
  .lbx-row.me { background: rgba(29,158,117,.10); border-radius: 9px; }
  .lbx-rank { grid-column: 1; grid-row: 1 / 3; font-size: 16px; font-weight: 800; min-width: 30px; text-align: center; color: var(--muted); }
  .lbx-name { grid-column: 2; grid-row: 1; font-weight: 700; font-size: 13.5px; color: var(--ink); }
  .lbx-you { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--accent); background: rgba(29,158,117,.16); border-radius: 999px; padding: 1px 6px; margin-left: 4px; }
  .lbx-sub { grid-column: 2; grid-row: 2; font-size: 11.5px; color: var(--muted); }
  .lbx-pts { grid-column: 3; grid-row: 1 / 3; align-self: center; font-size: 18px; font-weight: 800; color: var(--accent); text-align: right; white-space: nowrap; }
  .lbx-pts small { font-size: 10px; color: var(--muted); font-weight: 600; margin-left: 2px; }
  /* Game score banner */
  .game-score { margin-top: 16px; background: rgba(29,158,117,.12); border: 1px solid rgba(29,158,117,.4); color: var(--ink); border-radius: 10px; padding: 12px 15px; font-size: 14.5px; text-align: center; }
  .game-score b { color: var(--accent); }

  /* Sentence */
  .sentence .term { font-size: 22px; font-weight: 800; color: var(--brand-dark); }
  .sentence .prompt { color: var(--muted); margin: 6px 0 14px; }
  .sentence textarea { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 11px 13px; font: inherit; font-size: 14.5px; min-height: 80px; resize: vertical; }
  .model { display: none; margin-top: 14px; background: var(--bg); border-radius: 9px; padding: 13px 15px; line-height: 1.55; }
  .model.show { display: block; }
  .model .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--accent); display: block; margin-bottom: 4px; }

  /* Math */
  .math .problem { font-size: 17px; line-height: 1.55; }
  .math .worked { display: none; margin-top: 16px; background: var(--bg); border-radius: 9px; padding: 15px 17px; line-height: 1.6; }
  .math .worked.show { display: block; }
  .math .worked .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--accent); display: block; margin-bottom: 6px; }
  .math .answer { font-weight: 800; color: var(--brand-dark); }

  /* Quiz */
  .q .prompt { font-weight: 600; margin-bottom: 12px; font-size: 16px; }
  .choice { display: block; padding: 11px 14px; border: 1px solid var(--line); border-radius: 9px; margin-bottom: 8px; cursor: pointer; }
  .choice:hover { border-color: var(--accent); }
  .choice.correct { background: #ecfdf3; border-color: #abefc6; }
  .choice.wrong { background: #fef3f2; border-color: #fecdca; }
  .why { display: none; margin-top: 10px; font-size: 13.5px; color: var(--muted); background: var(--bg); border-radius: 8px; padding: 11px 13px; line-height: 1.5; }
  .why.show { display: block; }

  .seam { margin-top: 18px; font-size: 12.5px; color: var(--muted); border-left: 3px solid var(--accent); background: #f8fafc; padding: 10px 14px; border-radius: 0 8px 8px 0; line-height: 1.5; }
  .sample-flag { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }

  /* ── Mode (learning-type) section headers ── */
  .mode-header { display: flex; align-items: center; gap: 12px; margin: 0 0 12px; }
  .mode-ic { width: 40px; height: 40px; border-radius: 11px; background: var(--surface2); display: grid; place-items: center; font-size: 21px; flex-shrink: 0; }
  .mode-title { font-size: 15.5px; font-weight: 800; letter-spacing: .3px; }
  .mode-blurb { font-size: 12.5px; color: var(--muted); margin-top: 1px; }

  /* ── Match the Pairs ── */
  .m-hint { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
  .m-grid { display: flex; gap: 14px; }
  .m-col { flex: 1; display: flex; flex-direction: column; gap: 9px; }
  .m-tile { appearance: none; text-align: left; border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 9px; padding: 12px 14px; font: inherit; font-size: 14px; cursor: pointer; transition: border-color .12s, background .12s; }
  .m-tile:hover { border-color: var(--accent); }
  .m-tile.sel { border-color: var(--brand); background: rgba(87,155,252,.16); }
  .m-tile.done { border-color: rgba(0,200,117,.5); background: rgba(0,200,117,.14); color: var(--muted); cursor: default; }
  .m-tile.bad { border-color: rgba(255,59,59,.6); background: rgba(255,59,59,.16); }
  .m-status { margin-top: 14px; font-weight: 700; color: #00c875; min-height: 20px; }

  /* ── What Would You Do? ── */
  .wwyd .scenario { font-size: 16px; line-height: 1.55; margin-bottom: 14px; }
  .wwyd-choice { display: block; width: 100%; text-align: left; border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 9px; padding: 12px 14px; margin-bottom: 9px; font: inherit; font-size: 14.5px; cursor: pointer; }
  .wwyd-choice:hover { border-color: var(--accent); }
  .wwyd-choice.good { background: rgba(0,200,117,.14); border-color: rgba(0,200,117,.5); }
  .wwyd-choice.bad { background: rgba(255,59,59,.14); border-color: rgba(255,59,59,.5); }
  .wwyd-out { display: none; margin-top: 6px; background: var(--bg); border-radius: 9px; padding: 13px 15px; line-height: 1.55; }
  .wwyd-out.show { display: block; }
  .wwyd-out .ok { color: #00c875; } .wwyd-out .no { color: #ff7a7a; }

  /* ── What's the Difference? ── */
  .d-cols { display: flex; gap: 14px; margin-bottom: 18px; }
  .d-card { flex: 1; border: 1px solid var(--line); border-radius: 11px; padding: 14px 16px; background: var(--bg); }
  .d-card h4 { margin: 0 0 8px; color: var(--brand-dark); font-size: 15px; }
  .d-card ul { margin: 0; padding-left: 18px; } .d-card li { margin-bottom: 6px; font-size: 13.5px; line-height: 1.45; }
  @media (max-width: 620px) { .d-cols, .m-grid { flex-direction: column; } }

  /* ── Dark theme tuning (match Metrics dashboard) ── */
  .cat .num { background: var(--brand); color: #0d1117; }
  .tag.type { background: rgba(87,155,252,.16); color: var(--brand); }
  .tag.tier-found { background: rgba(0,200,117,.16); color: #00c875; }
  .tag.tier-build { background: rgba(87,155,252,.16); color: #579bfc; }
  .tag.tier-applied { background: rgba(255,100,46,.16); color: #ff642e; }
  .tag.tier-adv { background: rgba(255,59,59,.16); color: #ff5a5a; }
  .tag.count { background: rgba(255,255,255,.06); color: var(--muted); }
  .tag.scored { background: rgba(29,158,117,.18); color: var(--accent); font-weight: 700; }
  .choice.correct { background: rgba(0,200,117,.14); border-color: rgba(0,200,117,.45); }
  .choice.wrong { background: rgba(255,59,59,.14); border-color: rgba(255,59,59,.45); }
  .seam { background: rgba(255,255,255,.04); }
  .sentence textarea { background: var(--surface2); color: var(--ink); }

  /* ── Vocab/Acronym editor ── */
  #tab-manage { margin-left: auto; }
  .ac-modal { display: none; position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.6); align-items: center; justify-content: center; padding: 20px; }
  .ac-modal.open { display: flex; }
  .ac-card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; width: 100%; max-width: 580px; max-height: 86vh; display: flex; flex-direction: column; box-shadow: var(--shadow); }
  .ac-card-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid var(--line); }
  .ac-card-head h2 { margin: 0; font-size: 16px; }
  .ac-x { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  .ac-form { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
  .ac-form select, .ac-form input { background: var(--surface2); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; font: inherit; font-size: 13.5px; }
  .ac-form input { flex: 1; min-width: 150px; }
  .ac-btn { appearance: none; border: none; background: var(--brand); color: #0d1117; font: inherit; font-weight: 700; padding: 9px 16px; border-radius: 8px; cursor: pointer; }
  .ac-btn.ghost { background: var(--surface); color: var(--muted); border: 1px solid var(--line); }
  .ac-list { overflow: auto; padding: 6px 18px 18px; }
  .ac-kindhdr { font-size: 10.5px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); margin: 14px 0 4px; }
  .ac-li { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .ac-li .t { font-weight: 700; font-size: 13.5px; color: var(--brand-dark); }
  .ac-li .d { color: var(--muted); font-size: 12.5px; margin-top: 2px; line-height: 1.45; }
  .ac-meta { color: var(--muted); font-size: 11px; margin-top: 3px; opacity: .8; }
  .ac-li .ops { white-space: nowrap; }
  .ac-li .ops button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; margin-left: 6px; }
  .ac-li .ops button:hover { color: var(--brand); }
</style>
</head>
<body>
  <div class="academy-head">
    <h1 id="head-title">🎓 Knowledge Academy</h1>
    <p id="head-sub">Know the business. Sound like a pro on the phone and in the room.</p>
    <div class="top-tabs">
      <button id="tab-academy" class="active" onclick="setTop('academy')">🎓 Knowledge Academy</button>
      <button id="tab-trainer" onclick="setTop('trainer')">🤖 AI Robot Trainer</button>
      <button id="tab-manage" onclick="openAcEditor()">✏️ Add / edit terms</button>
    </div>
  </div>

  <main id="view-academy">
    <section id="grid"></section>
    <section id="module" style="display:none"></section>
  </main>

  for (let k = idxs.length - 1; k > 0; k--) { const r = Math.floor(Math.random() * (k + 1)); [idxs[k], idxs[r]] = [idxs[r], idxs[k]]; }
  flash = { catIdx: cur.cat, level, queue: idxs, flipped: false, knew: 0, missed: new Set(), total: c.items.length, anim: "", busy: false };
}
function renderFlash(c) {
  const head = `
    <button class="back-link" onclick="renderGrid()">← All games</button>
    <div class="module-head">
      <h2>${c.title}</h2>
      <span class="sub">${TYPE_LABEL.flash} · ${TIER_LABEL[c.tier]}</span>
    </div>`;
  document.getElementById("module").innerHTML = head + flashBody(c);
}
function flashBody(c) {
  const f = flash;
  const masteredNow = (f.level != null && prog.levels[f.level]) ? prog.levels[f.level].size : f.knew;
  const allIdxs = `CATEGORIES[${f.catIdx}].items.map((_,k)=>k)`;
  // Deck cleared / nothing left to study
  if (!f.queue.length) {
    const missed = f.missed.size;
    const fully = f.total > 0 && masteredNow >= f.total;
    return `<div class="panel">
      <div class="fs-done">🎉 ${fully ? `You've mastered all ${f.total}!` : `Deck cleared — ${masteredNow} of ${f.total} mastered.`}</div>
      <div class="fs-donesub">${missed ? `You stumbled on <b>${missed}</b> along the way — drill just those, or run the whole deck again.` : "Clean run. Your progress is saved — come back anytime to keep it sharp."}</div>
      <div class="row fs-actions">
        ${missed ? `<button class="btn good" onclick="startFlash(CATEGORIES[${f.catIdx}],[${[...f.missed].join(",")}]);renderModule()">↻ Review the ${missed} you missed</button>` : ""}
        <button class="btn ghost" onclick="startFlash(CATEGORIES[${f.catIdx}],${allIdxs});renderModule()">Review all ${f.total} again</button>
        <button class="btn ghost" onclick="renderGrid()">← All games</button>
      </div>
    </div>`;
  }
  const id = f.queue[0];
  const it = c.items[id];
  const remaining = f.queue.length;
  const pct = f.total ? Math.round(masteredNow / f.total * 100) : 0;
  const ghosts = (remaining > 2 ? `<div class="fs-ghost g2"></div>` : "") + (remaining > 1 ? `<div class="fs-ghost g1"></div>` : "");
  return `<div class="panel flash">
    <div class="fs-stats">
      <span class="fs-pill knew">✓ Mastered<b>${masteredNow}/${f.total}</b></span>
      <span class="fs-pill review">↻ Review<b>${f.missed.size}</b></span>
      <span class="fs-remain">${remaining} <small>to go</small></span>
    </div>
    <div class="fs-deck">
      ${ghosts}
      <div class="fs-card${f.flipped ? " flip" : ""}${f.anim ? " " + f.anim : ""}" onclick="flashFlip()">
        <div class="fs-front"><span class="kind">tap to flip</span><div class="term">${it.term}</div><span class="fs-tag">click to reveal the definition</span></div>
        <div class="fs-back"><div class="def">${it.def}</div></div>
      </div>
    </div>
    <div class="row fs-actions">
      <button class="btn bad-btn" onclick="flashSort(false)">Didn't know ↻</button>
      <button class="btn good" onclick="flashSort(true)">I knew it ✓</button>
    </div>
    <div class="fs-bar"><span style="width:${pct}%"></span></div>
  </div>`;
}
function flashFlip() {
  if (flash.busy) return;
  flash.flipped = !flash.flipped;
  renderModule();
}
function flashSort(known) {
  const f = flash;
  if (f.busy || !f.queue.length) return;
  f.busy = true;
  f.flipped = false;
  f.anim = known ? "fly-right" : "fly-left";
  renderModule();
  setTimeout(() => {
    const id = f.queue.shift();
    if (known) {
      f.knew++;
      if (f.level != null) {
        const c = CATEGORIES[f.catIdx];
        if (!prog.levels[f.level]) prog.levels[f.level] = new Set();
        prog.levels[f.level].add(c.items[id].id);
        saveLevelProgress(f.level);
      }
    } else { f.missed.add(id); f.queue.push(id); }
    f.anim = ""; f.busy = false;
    renderModule();
  }, 330);
}

function sentenceEngine(it) {
  return `<div class="panel sentence">
    <div class="term">${it.term}</div>
    <p class="prompt">${it.prompt}</p>
    <textarea placeholder="Type how you'd say it out loud…"></textarea>
    <div class="model" id="model"><span class="lbl">Model answer</span>${it.model}</div>
    <div class="row">
      <button class="btn ghost" onclick="prevItem()">← Prev</button>
      <button class="btn good" onclick="document.getElementById('model').classList.add('show');maybeGameDone()">Reveal model</button>
      <button class="btn" onclick="nextItem()">Next →</button>
    </div>
  </div>`;
}

function mathEngine(it) {
  return `<div class="panel math">
    <div class="problem">${it.problem}</div>
    <div class="worked" id="worked"><span class="lbl">Worked example</span>${it.worked}</div>
    <div class="row">
      <button class="btn ghost" onclick="prevItem()">← Prev</button>
      <button class="btn good" onclick="document.getElementById('worked').classList.add('show');maybeGameDone()">Show worked example</button>
      <button class="btn" onclick="nextItem()">Next →</button>
    </div>
  </div>`;
}

// Shuffle a choices array so the correct answer isn't always in the same slot.
function shuffledChoices(it) {
  const order = it.choices.map((_, i) => i);
  for (let k = order.length - 1; k > 0; k--) { const r = Math.floor(Math.random() * (k + 1)); [order[k], order[r]] = [order[r], order[k]]; }
  return { order, correctPos: order.indexOf(it.answer) };
}
function quizEngine(it) {
  const { order, correctPos } = shuffledChoices(it);
  return `<div class="panel q">
    <div class="prompt">${it.q}</div>
    ${order.map((origIdx, pos) => `<label class="choice" onclick="answerQuiz(${pos},${correctPos})"><input type="radio" name="q" style="margin-right:9px">${it.choices[origIdx]}</label>`).join("")}
    <div class="why" id="why"><strong>Why:</strong> ${it.why}</div>
    <div class="row">
      <button class="btn ghost" onclick="prevItem()">← Prev</button>
      <button class="btn" onclick="nextItem()">Next →</button>
    </div>
  </div>`;
}
function answerQuiz(picked, correct) {
  const labels = document.querySelectorAll(".choice");
  labels.forEach(l => l.classList.remove("correct", "wrong"));
  labels[correct].classList.add("correct");
  if (picked !== correct) labels[picked].classList.add("wrong");
  document.getElementById("why").classList.add("show");
  if (gscore && !gscore.answered.has(cur.idx)) { gscore.answered.add(cur.idx); if (picked === correct) gscore.correct++; }
  maybeGameDone();
}

/* ── Acronyms drill (flip an acronym to its meaning) ── */
function acronymEngine(it) {
  const back = `<div class="def"><div class="term" style="font-size:21px">${it.full}</div>${it.note ? `<p style="margin-top:10px;color:var(--muted);font-size:15px">${it.note}</p>` : ""}</div>`;
  return `<div class="panel flash">
    <div class="face" onclick="cur.flipped=!cur.flipped;renderModule()">
      ${cur.flipped ? back : `<div class="term">${it.ac}</div>`}
    </div>
    <p class="flip-hint">Click to ${cur.flipped ? "see the acronym" : "reveal the meaning"}</p>
    <div class="row">
      <button class="btn ghost" onclick="prevItem()">← Prev</button>
      <button class="btn good" onclick="cur.known++;nextItem()">I knew it ✓</button>
      <button class="btn" onclick="nextItem()">Next →</button>
    </div>
  </div>`;
}

/* ── Match the Pairs ── */
let matchSel = null, matchDone = 0, matchTotal = 0;
function matchEngine(it) {
  matchSel = null; matchDone = 0; matchTotal = it.pairs.length;
  const lefts = it.pairs.map((p, i) => `<button class="m-tile" id="mL${i}" onclick="matchLeft(${i})">${p.a}</button>`).join("");
  const order = it.pairs.map((p, i) => i);
  for (let k = order.length - 1; k > 0; k--) { const r = Math.floor(Math.random() * (k + 1)); [order[k], order[r]] = [order[r], order[k]]; }
  const rights = order.map(j => `<button class="m-tile" id="mR${j}" onclick="matchRight(${j})">${it.pairs[j].b}</button>`).join("");
  return `<div class="panel">
    <p class="m-hint">Click an item on the left, then its match on the right.</p>
    <div class="m-grid"><div class="m-col">${lefts}</div><div class="m-col">${rights}</div></div>
    <div class="m-status" id="m-status"></div>
    <div class="row"><button class="btn ghost" onclick="renderModule()">↻ Reset</button></div>
  </div>`;
}
function matchLeft(i) {
  const t = document.getElementById("mL" + i);
  if (t.classList.contains("done")) return;
  document.querySelectorAll(".m-col .m-tile").forEach(x => x.classList.remove("sel"));
  matchSel = i; t.classList.add("sel");
}
function matchRight(j) {
  const r = document.getElementById("mR" + j);
  if (r.classList.contains("done") || matchSel === null) return;
  const l = document.getElementById("mL" + matchSel);
  const sel = matchSel;
  if (matchSel === j) {
    l.classList.remove("sel"); l.classList.add("done"); r.classList.add("done");
    matchDone++; matchSel = null;
    if (gscore && !gscore.pairWrong.has(sel)) gscore.correct++; // credit only if no wrong attempt on this pair
    if (matchDone === matchTotal) {
      const score = gscore ? gscore.correct : matchTotal;
      document.getElementById("m-status").innerHTML = `✅ Solved! <b>${score}/${matchTotal}</b> on the first try.`;
      markGameDone(CATEGORIES[cur.cat], score, matchTotal);
    }
  } else {
    r.classList.add("bad"); l.classList.add("bad");
    if (gscore) gscore.pairWrong.add(sel);
    setTimeout(() => { r.classList.remove("bad"); const ll = document.getElementById("mL" + sel); if (ll) ll.classList.remove("bad", "sel"); }, 550);
    matchSel = null;
  }
}

/* ── What Would You Do? ── */
function wwydEngine(it) {
  const order = it.choices.map((_, i) => i);
  for (let k = order.length - 1; k > 0; k--) { const r = Math.floor(Math.random() * (k + 1)); [order[k], order[r]] = [order[r], order[k]]; }
  return `<div class="panel wwyd">
    <div class="scenario">${it.scenario}</div>
    ${order.map(origIdx => `<button class="wwyd-choice" data-ci="${origIdx}" onclick="wwydPick(${origIdx})">${it.choices[origIdx].text}</button>`).join("")}
    <div class="wwyd-out" id="wwyd-out"></div>
    <div class="row"><button class="btn ghost" onclick="prevItem()">← Prev</button><button class="btn" onclick="nextItem()">Next scenario →</button></div>
  </div>`;
}
function wwydPick(ci) {
  const it = CATEGORIES[cur.cat].items[cur.idx];
  const btns = document.querySelectorAll(".wwyd-choice");
  btns.forEach(b => { b.classList.remove("good", "bad"); if (it.choices[+b.dataset.ci].good) b.classList.add("good"); });
  const c = it.choices[ci];
  if (!c.good) { const bad = [...btns].find(b => +b.dataset.ci === ci); if (bad) bad.classList.add("bad"); }
  const out = document.getElementById("wwyd-out");
  out.innerHTML = `<span class="${c.good ? "ok" : "no"}"><strong>${c.good ? "Good move." : "Watch out."}</strong></span> ${c.outcome}`;
  out.classList.add("show");
  if (gscore && !gscore.answered.has(cur.idx)) { gscore.answered.add(cur.idx); if (c.good) gscore.correct++; }
  maybeGameDone();
}

/* ── What's the Difference? ── */
function diffEngine(it) {
  const col = s => `<div class="d-card"><h4>${s.name}</h4><ul>${s.points.map(p => `<li>${p}</li>`).join("")}</ul></div>`;
  return `<div class="panel diff">
    <div class="d-cols">${col(it.a)}${col(it.b)}</div>
    <div class="q">
      <div class="prompt">${it.q}</div>
      ${(() => { const { order, correctPos } = shuffledChoices(it); return order.map((origIdx, pos) => `<label class="choice" onclick="answerQuiz(${pos},${correctPos})"><input type="radio" name="dq" style="margin-right:9px">${it.choices[origIdx]}</label>`).join(""); })()}
      <div class="why" id="why"><strong>Why:</strong> ${it.why}</div>
    </div>
    <div class="row"><button class="btn ghost" onclick="prevItem()">← Prev</button><button class="btn" onclick="nextItem()">Next →</button></div>
  </div>`;
}

document.getElementById("ac-cancel").addEventListener("click", resetAcForm);
document.getElementById("ac-editor").addEventListener("click", e => { if (e.target.id === "ac-editor") closeAcEditor(); });
loadAcademyDB();
