<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Rizzolo · Training Studio</title>
<style>
  :root {
    --bg: #13151a;
    --surface: #1a1d23;
    --surface2: #1e2128;
    --ink: #e8e8e8;
    --muted: #9aa1ab;
    --line: #2a2d35;
    --brand: #579bfc;
    --brand-dark: #a9c9ff;
    --accent: #1D9E75;
    --good: #00c875;
    --warn: #ff642e;
    --bad: #ff3b3b;
    --shadow: 0 1px 3px rgba(0,0,0,.45), 0 1px 2px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    font-size: 15px;
  }

  /* ── Studio header ── */
  .studio-head {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .studio-top {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 22px 0;
  }
  .studio-title { font-weight: 700; font-size: 16px; letter-spacing: .2px; }
  .studio-title small { font-weight: 500; color: var(--muted); margin-left: 8px; font-size: 13px; }
  .mode-toggle {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .switch {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 999px;
    overflow: hidden;
    background: var(--bg);
  }
  .switch button {
    appearance: none; border: none; background: none; font: inherit;
    padding: 7px 14px; cursor: pointer; color: var(--muted); font-weight: 600; font-size: 13px;
  }
  .switch button.on { background: var(--brand); color: #fff; }

  .track-tabs { display: flex; gap: 4px; padding: 8px 18px 0; }
  .track-tabs button {
    appearance: none; border: none; background: none; font: inherit;
    color: var(--muted); padding: 12px 16px; cursor: pointer;
    border-bottom: 3px solid transparent; margin-bottom: -1px; font-weight: 600;
  }
  .track-tabs button:hover { color: var(--ink); }
  .track-tabs button.active { color: var(--brand); border-bottom-color: var(--brand); }

  /* ── Mode banner ── */
  .mode-banner {
    padding: 10px 22px; font-size: 13px; line-height: 1.5;
    border-bottom: 1px solid var(--line);
  }
  .mode-banner.coach { background: #fff7ed; color: #7a3e00; }
  .mode-banner.trainee { background: #eff6ff; color: #0f4ba8; }

  /* ── Layout ── */
  main { flex: 1; padding: 22px; max-width: 1180px; width: 100%; margin: 0 auto; }
  .track-blurb { color: var(--muted); margin: 0 0 18px; line-height: 1.55; }

  .subnav { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .subnav button {
    appearance: none; border: 1px solid var(--line); background: var(--surface);
    font: inherit; font-weight: 600; color: var(--muted); padding: 9px 16px;
    border-radius: 9px; cursor: pointer;
  }
  .subnav button.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .view { display: none; }
  .view.active { display: block; }

  /* ── Study segments ── */
  .seg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .seg-card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px; box-shadow: var(--shadow); cursor: pointer; transition: border-color .15s, transform .1s;
  }
  .seg-card:hover { border-color: var(--brand); transform: translateY(-1px); }
  .seg-card h3 { margin: 0 0 6px; font-size: 15px; }
  .seg-card .meta { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
  .seg-card p { margin: 8px 0 0; color: var(--muted); font-size: 13.5px; line-height: 1.5; }
  .seg-reader { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 26px; box-shadow: var(--shadow); }
  .seg-reader h2 { margin: 0 0 4px; }
  .seg-reader .body { line-height: 1.65; color: #2b3a48; }
  .seg-reader .body li { margin: 5px 0; }
  .back-link { background: none; border: none; color: var(--brand); font: inherit; font-weight: 600; cursor: pointer; padding: 0; margin-bottom: 14px; }

  /* ── Quiz ── */
  .quiz { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 26px; box-shadow: var(--shadow); max-width: 720px; }
  .q { margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--line); }
  .q:last-of-type { border-bottom: none; }
  .q .prompt { font-weight: 600; margin-bottom: 12px; }
  .choice { display: block; padding: 11px 14px; border: 1px solid var(--line); border-radius: 9px; margin-bottom: 8px; cursor: pointer; transition: background .12s, border-color .12s; }
  .choice:hover { border-color: var(--brand); }
  .choice input { margin-right: 9px; }
  .choice.correct { background: #ecfdf3; border-color: #abefc6; }
  .choice.wrong { background: #fef3f2; border-color: #fecdca; }
  .why { display: none; margin-top: 10px; font-size: 13.5px; color: var(--muted); background: var(--bg); border-radius: 8px; padding: 10px 12px; line-height: 1.5; }
  .why.show { display: block; }
  .quiz-actions { margin-top: 6px; display: flex; align-items: center; gap: 14px; }
  .btn { appearance: none; border: none; background: var(--brand); color: #fff; font: inherit; font-weight: 600; padding: 10px 18px; border-radius: 9px; cursor: pointer; }
  .btn.ghost { background: var(--surface); color: var(--brand); border: 1px solid var(--line); }
  .score-pill { font-weight: 700; }

  /* ── Roleplay grid ── */
  .grid-wrap { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); overflow-x: auto; }
  .grid-legend { font-size: 12.5px; color: var(--muted); margin: 0 0 14px; }
  table.bots { border-collapse: collapse; width: 100%; min-width: 640px; }
  table.bots th, table.bots td { padding: 7px 6px; text-align: center; }
  table.bots th.scn { text-align: left; min-width: 150px; }
  table.bots td.scn { text-align: left; font-weight: 600; font-size: 13.5px; }
  table.bots td.scn small { display: block; font-weight: 400; color: var(--muted); font-size: 12px; line-height: 1.35; margin-top: 2px; }
  .diff-head { font-size: 11px; color: var(--muted); }
  .bot {
    width: 30px; height: 30px; border-radius: 7px; border: none; cursor: pointer;
    font-weight: 700; font-size: 12px; color: #fff;
  }
  .bot:hover { outline: 2px solid var(--ink); }

  /* ── Chat ── */
  .chat-shell { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; }
  @media (max-width: 860px) { .chat-shell { grid-template-columns: 1fr; } }
  .chat-card, .score-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); display: flex; flex-direction: column; }
  .chat-head { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .chat-head .who { font-weight: 700; }
  .chat-head .tag { font-size: 11.5px; font-weight: 700; color: #fff; padding: 3px 9px; border-radius: 999px; }
  .chat-log { padding: 16px 18px; flex: 1; min-height: 320px; max-height: 440px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg { width: fit-content; max-width: 82%; padding: 10px 13px; border-radius: 12px; line-height: 1.45; font-size: 14px; }
  .msg.bot { background: var(--bg); align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.me { background: var(--brand); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg .lbl { display: block; font-size: 11px; font-weight: 700; opacity: .7; margin-bottom: 2px; }
  .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--line); }
  .chat-input textarea { flex: 1; resize: none; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; font: inherit; font-size: 14px; height: 46px; }
  .score-card { padding: 18px; }
  .score-card h3 { margin: 0 0 4px; font-size: 15px; }
  .score-card .hint { font-size: 12.5px; color: var(--muted); margin: 0 0 16px; line-height: 1.45; }
  .metric { margin-bottom: 14px; }
  .metric label { font-weight: 600; font-size: 13.5px; display: flex; justify-content: space-between; }
  .metric label span { color: var(--muted); font-weight: 700; }
  .metric input[type=range] { width: 100%; margin-top: 4px; }
  .metric .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .golden { margin-top: 8px; }
  .golden textarea { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; font: inherit; font-size: 13.5px; min-height: 90px; resize: vertical; }
  .golden label { font-weight: 600; font-size: 13.5px; display: block; margin-bottom: 6px; }

  .pill-note { display: inline-block; font-size: 11.5px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; color: var(--brand-dark); background: #eef4ff; padding: 4px 10px; border-radius: 999px; }
  .seam {
    margin-top: 18px; font-size: 12.5px; color: var(--muted);
    border-left: 3px solid var(--brand); background: #f8fafc; padding: 10px 14px; border-radius: 0 8px 8px 0; line-height: 1.5;
  }
  .empty { color: var(--muted); padding: 30px; text-align: center; }

  /* ── Dark theme tuning (match Metrics dashboard) ── */
  .seg-reader .body { color: #cdd3da; }
  .mode-banner.coach { background: rgba(255,100,46,.12); color: #ffb38a; }
  .mode-banner.trainee { background: rgba(87,155,252,.12); color: #9cc2ff; }
  .choice.correct { background: rgba(0,200,117,.14); border-color: rgba(0,200,117,.45); }
  .choice.wrong { background: rgba(255,59,59,.14); border-color: rgba(255,59,59,.45); }
  .pill-note { color: var(--brand); background: rgba(87,155,252,.14); }
  .seam { background: rgba(255,255,255,.04); }
  .chat-input textarea, .golden textarea { background: var(--surface2); color: var(--ink); }
</style>
</head>
<body>
  <div class="studio-head">
    <div class="studio-top">
      <div class="studio-title">🤖 Training Studio <small>practice, test, and spar with the bots</small></div>
      <div class="mode-toggle">
        <span>Mode</span>
        <div class="switch">
          <button id="mode-coach" class="on" onclick="setMode('coach')">Coach (Sal)</button>
          <button id="mode-trainee" onclick="setMode('trainee')">Trainee</button>
        </div>
      </div>
    </div>
    <div class="track-tabs" id="trackTabs"></div>
  </div>

  <div class="mode-banner coach" id="modeBanner"></div>

  <main>
    <p class="track-blurb" id="trackBlurb"></p>

    <div class="subnav">
      <button data-view="study" class="active" onclick="setView('study')">📚 Study</button>
      <button data-view="test" onclick="setView('test')">📝 Test</button>
      <button data-view="roleplay" onclick="setView('roleplay')">🥊 Roleplay Bots</button>
      <button data-view="metrics" onclick="setView('metrics')">📊 Grading Metrics</button>
    </div>

    <section class="view active" id="view-study"></section>
    <section class="view" id="view-test"></section>
    <section class="view" id="view-roleplay"></section>
    <section class="view" id="view-metrics"></section>
  </main>

<script>
/* ============================================================
   CONTENT MODEL
   This object is the single source of truth. You (Sal) and I
   extend it as we author segments, tests, scenarios, metrics.
   Each track: { label, blurb, segments[], test{}, scenarios[], metrics[] }
   Bot grid per track = scenarios (rows) × difficulty 1..10 (cols).
   ============================================================ */
const TRACKS = {
  junior: {
    label: "Junior",
    blurb: "Document collection & borrower outreach. The job: get the file complete, fast, and build enough trust that borrowers actually send their sensitive docs the right way.",
    segments: [
      { title: "The Document Checklist", mins: 6, teaser: "What a complete file actually needs before it moves.",
        body: `<p>A clean initial file usually needs:</p>
        <ul>
          <li>Most recent <strong>30 days of pay stubs</strong></li>
          <li><strong>2 years of W-2s</strong> (and full tax returns if self-employed)</li>
          <li><strong>2 months of bank statements</strong> — all pages, even the blank one</li>
          <li>Government-issued <strong>photo ID</strong></li>
          <li>Award letters / 1099s / pension docs for non-W-2 income</li>
        </ul>
        <p>Rule of thumb: ask for everything once, clearly, with the <em>why</em>. Half-collected files are what stall closings.</p>` },
      { title: "The First Outreach", mins: 5, teaser: "Introduce yourself, set expectations, route docs securely.",
        body: `<p>Goals of the first contact: confirm you're a real human on their team, set the timeline, and give them <strong>one secure place</strong> to upload.</p>
        <ul>
          <li>State your name, the LO's name, and the company.</li>
          <li>Give the secure portal link — never ask for full SSN or docs over plain email/text.</li>
          <li>Set a concrete next step: "Can you upload these 4 items by Thursday?"</li>
        </ul>` },
      { title: "Chasing Missing Items", mins: 4, teaser: "A polite, persistent cadence that doesn't annoy.",
        body: `<p>Follow-up cadence that works: same-day confirm, +2 day nudge, +4 day call, then loop in the LO. Always say <em>exactly</em> what's still missing and why it matters to <em>their</em> closing date.</p>` },
      { title: "Earning Trust with a Skeptical Borrower", mins: 5, teaser: "\"How do I know you're really with the company?\"",
        body: `<p>Skepticism is healthy — fraud is real. Don't get defensive. Instead:</p>
        <ul>
          <li>Offer to verify yourself: "Call the branch's published number and ask for me."</li>
          <li>Reference something only the team would know (their LO's name, application detail).</li>
          <li>Point them to the official secure portal on the company domain.</li>
          <li>Never pressure. A borrower who verifies you is a borrower who trusts you after.</li>
        </ul>` },
    ],
    test: { questions: [
      { q: "How many months of bank statements are typically required for an initial file?",
        choices: ["1 month", "2 months", "6 months", "Whatever the borrower has handy"],
        answer: 1, why: "Two months (all pages) is the standard ask so income/asset patterns can be verified." },
      { q: "A borrower says \"How do I know you're really with the company?\" — best first move?",
        choices: ["Insist you're legit and tell them to just send the docs",
                  "Invite them to call the branch's published number and ask for you",
                  "Send your personal cell as proof",
                  "Tell them everyone gets verified, it's policy"],
        answer: 1, why: "Hand them a verification path you don't control — the published company number. It builds trust instead of demanding it." },
      { q: "Where should a borrower send sensitive documents?",
        choices: ["Reply-all email", "Text message photo", "The company's secure upload portal", "Whatever's fastest"],
        answer: 2, why: "Sensitive PII goes through the secure portal only — never plain email or text." },
    ]},
    scenarios: [
      { key: "initial", name: "Initial document request", desc: "First ask for the full checklist." },
      { key: "missing", name: "Missing-item follow-up", desc: "Chasing the 1–2 items still outstanding." },
      { key: "skeptic", name: "Skeptical / identity-check borrower", desc: "\"How do I know you're with the company?\"" },
      { key: "ghost", name: "Unresponsive / ghosting borrower", desc: "Re-engaging someone who's gone quiet." },
    ],
    metrics: [
      { name: "Completeness", desc: "Did they ask for the right docs and miss nothing?" },
      { name: "Clarity of ask", desc: "Were instructions specific and easy to act on?" },
      { name: "Trust & security", desc: "Secure channel used; identity reassured without pressure." },
      { name: "Tone & empathy", desc: "Warm, professional, not robotic or pushy." },
      { name: "Follow-up plan", desc: "Clear next step and deadline set." },
    ],
  },

  lo: {
    label: "Loan Officer",
    blurb: "Answering borrowers on rate, timelines, and scenarios — and defusing the hostile ones — accurately and compliantly, while still moving the deal forward.",
    segments: [
      { title: "Rate, APR & Locks", mins: 6, teaser: "Talk rate without making promises you can't keep.",
        body: `<p>Know the difference between <strong>rate</strong> and <strong>APR</strong>, what a lock protects, and the compliant way to discuss pricing. Never guarantee a rate that isn't locked.</p>` },
      { title: "Timeline & Milestones", mins: 5, teaser: "Application → approval → CTC → closing.",
        body: `<p>Set expectations on each milestone and what can move the date (appraisal, conditions, borrower docs).</p>` },
      { title: "Tricky Scenarios", mins: 7, teaser: "Self-employed, gift funds, DTI edge cases.",
        body: `<p>How to qualify and explain less-standard income/asset situations without overpromising approval.</p>` },
      { title: "Defusing a Hostile Borrower", mins: 6, teaser: "Stay calm, acknowledge, redirect to a solution.",
        body: `<p>Acknowledge the feeling, take ownership of the next step, and convert heat into a concrete action. Never match their tone.</p>` },
    ],
    test: { questions: [
      { q: "A borrower asks you to 'guarantee' today's rate before applying. Best response?",
        choices: ["Promise it to win the deal", "Explain rates aren't locked until application/lock and walk them through how to lock",
                  "Tell them rates never change", "Refuse to discuss rate"],
        answer: 1, why: "You can discuss pricing but never guarantee an unlocked rate — explain the lock mechanism instead." },
      { q: "Best way to open with an angry borrower who feels ignored?",
        choices: ["Defend the team", "Acknowledge the frustration and own the next concrete step",
                  "Explain how busy you are", "Transfer them"],
        answer: 1, why: "Acknowledge + own the next step de-escalates faster than defending or explaining." },
    ]},
    scenarios: [
      { key: "rate", name: "Rate / pricing question", desc: "Borrower shopping or anxious about rate." },
      { key: "timeline", name: "Timeline / expectations", desc: "\"Why is this taking so long?\"" },
      { key: "scenario", name: "Qualification scenario", desc: "Self-employed, gift funds, DTI questions." },
      { key: "hostile", name: "Hostile / upset borrower", desc: "Angry, threatening to walk." },
    ],
    metrics: [
      { name: "Accuracy", desc: "Factually correct on rate/timeline/guidelines." },
      { name: "Compliance", desc: "No improper rate guarantees or promises." },
      { name: "De-escalation", desc: "Lowered the temperature, kept the deal alive." },
      { name: "Value / advice", desc: "Gave genuinely useful guidance, not deflection." },
      { name: "Next-step clarity", desc: "Borrower knows exactly what happens next." },
    ],
  },

  k203: {
    label: "203(k) Intro Call",
    blurb: "Practice the 203(k) renovation-loan introductory call — for juniors and LOs. Review the lead, confirm the details, build real rapport, explain how the loan works in plain English, create urgency, get the realtor's info, and lock in next steps. Each call is graded on the metrics below.",
    segments: [
      { title: "What a 203(k) Loan Is", mins: 5, teaser: "FHA purchase + renovation in one loan.",
        body: `<p>A <strong>203(k)</strong> is an FHA loan that finances the <strong>purchase plus the renovation in a single loan and closing</strong>, based on the home's <em>after-improved</em> value.</p>
        <ul>
          <li><strong>Limited 203(k)</strong> — up to ~$35k, cosmetic/non-structural repairs, no HUD consultant required.</li>
          <li><strong>Standard 203(k)</strong> — larger or structural work; requires a HUD consultant.</li>
          <li>Great for a buyer who found a home that needs work but doesn't have cash to renovate.</li>
        </ul>
        <p>On the intro call your job isn't to underwrite it — it's to make them <em>trust you</em> and understand the path.</p>` },
      { title: "Anatomy of the Intro Call", mins: 6, teaser: "The flow that wins the borrower and the realtor.",
        body: `<p>A strong 203(k) intro call runs in this order:</p>
        <ol>
          <li><strong>Review</strong> what you already have (the lead, property, scenario) before you dial.</li>
          <li><strong>Confirm</strong> the key facts — contact info, the property, their budget, and timeline.</li>
          <li><strong>Build rapport</strong> — relate to them, find common ground, make them smile.</li>
          <li><strong>Explain the 203(k)</strong> simply — one loan, purchase + renovation, after-improved value.</li>
          <li><strong>Create urgency</strong> — get pre-approved so they can make offers; contractor and rate timing.</li>
          <li><strong>Ask for the realtor's info</strong> — name and contact, so you can partner on the deal.</li>
          <li><strong>Set next steps</strong> — a concrete action and a follow-up time.</li>
        </ol>` },
      { title: "Creating Urgency the Right Way", mins: 4, teaser: "Move them to act without false pressure.",
        body: `<p>Urgency that's honest and effective: \"Let's get you fully pre-approved this week so when you find the right project, your offer is as strong as a cash buyer's.\" Tie it to <strong>getting offer-ready</strong>, contractor/bid timelines, and the rate environment — never a fake deadline.</p>` },
    ],
    test: { questions: [
      { q: "A 203(k) loan lets a buyer…", choices: ["Buy two homes at once","Finance the purchase AND the renovation in one loan","Skip the appraisal","Avoid all mortgage insurance"], answer: 1, why: "It rolls the purchase and the renovation into a single FHA loan and closing." },
      { q: "The Limited 203(k) is generally for…", choices: ["Major structural rebuilds","Cosmetic/non-structural repairs up to ~$35k","Commercial property","Land only"], answer: 1, why: "Limited covers smaller, non-structural work with no HUD consultant required." },
      { q: "Early in a 203(k) intro call, before pitching, you should first…", choices: ["Quote a rate","Review and confirm the borrower's info and situation","Ask for their SSN","Send a pre-approval letter"], answer: 1, why: "Review what you have and confirm the facts first — it shows you're prepared and builds trust." },
      { q: "A great intro call almost always ends by…", choices: ["Hanging up quickly","Getting the realtor's info and setting a concrete next step","Promising the lowest rate","Sending a long email"], answer: 1, why: "Capture the realtor and lock a next step — that's how the deal and the partnership move forward." },
    ]},
    scenarios: [
      { key: "warm", name: "Warm lead — fixer-upper", desc: "Found a home that needs work; curious how to finance it." },
      { key: "realtor", name: "Realtor-referred buyer", desc: "Sent by an agent; sizing up whether you're the right lender." },
      { key: "firsttimer", name: "Skeptical first-timer", desc: "Nervous, lots of questions, unsure about a renovation loan." },
      { key: "shopper", name: "Rate / price shopper", desc: "Fixated on rate and fees; needs to see value beyond price." },
    ],
    metrics: [
      { name: "Reviewed the file", desc: "Reviewed the lead and the info we already had, and showed it." },
      { name: "Confirmed key info", desc: "Confirmed contact info, the property, budget, and timeline." },
      { name: "Built rapport", desc: "Connected personally — related to them or got them to laugh." },
      { name: "Call length (10+ min)", desc: "Stayed on the call long enough to do it right (~10 minutes)." },
      { name: "Asked for the realtor", desc: "Got the realtor's name and contact information." },
      { name: "Created urgency", desc: "Gave a real reason to act now — offer-ready, timeline, rates." },
      { name: "Explained the 203(k)", desc: "Explained how the renovation loan works, in plain English." },
      { name: "Set next steps", desc: "Locked in a concrete next action and a follow-up time." },
    ],

function gradeQuiz() {
  const t = TRACKS[state.track];
  let correct = 0;
  t.test.questions.forEach((q, qi) => {
    const picked = document.querySelector(`input[name="q${qi}"]:checked`);
    document.querySelectorAll(`.q[data-q="${qi}"] .choice`).forEach(l => l.classList.remove("correct", "wrong"));
    document.querySelector(`.why[data-why="${qi}"]`).classList.add("show");
    if (!picked) return;
    const pi = +picked.value;
    const labels = document.querySelectorAll(`.q[data-q="${qi}"] .choice`);
    labels[q.answer].classList.add("correct");
    if (pi === q.answer) correct++; else labels[pi].classList.add("wrong");
  });
  const total = t.test.questions.length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById("quizScore").textContent = `Score: ${correct}/${total} (${pct}%)`;
}

  const list = (arr, title, cls) => (arr && arr.length) ? `<div style="margin-top:12px"><div style="font-weight:700;font-size:13px;margin-bottom:4px">${title}</div><ul style="margin:0;padding-left:18px;font-size:13px;color:var(--muted);line-height:1.55">${arr.map(x => `<li class="${cls}">${escapeHtml(x)}</li>`).join("")}</ul></div>` : "";
  return `<h3>AI Scorecard <span style="float:right;color:${color};font-size:22px;font-weight:800">${ov}%</span></h3>
    <p class="hint">${escapeHtml(g.summary || "")}</p>
    ${rows}
    ${list(g.strengths, "Strengths", "ok")}
    ${list(g.improvements, "To improve", "no")}
    <button class="btn ghost" style="margin-top:14px" onclick="state.bot.grade=null;render()">↺ Keep going</button>`;
}
function escapeHtml(s) { return String(s == null ? "" : s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

async function requestGrade() {
  const btn = document.getElementById("gradeBtn");
  if (btn) { btn.disabled = true; btn.textContent = "Grading the call…"; }
  try {
    const t = TRACKS[state.track];
    const data = await callTrainer({
      action: "grade", ...botMeta(), history: state.bot.log, metrics: t.metrics,
      elapsedMinutes: (Date.now() - state.bot.start) / 60000,
    });
    if (data.grade) { state.bot.grade = data.grade; try { window.parent.postMessage({ type: "usage", action: "trainer_grade", detail: t.label }, location.origin); } catch (_) {} }
    else alert("Grading hiccup — please try again.\n" + (data.error || ""));
  } catch (e) { alert("Couldn't reach the grader. Try again in a moment."); }
  render();
}

function paintLog() {
  const log = document.getElementById("chatLog");
  if (!log) return;
  const rows = state.bot.log.map(m => `<div class="msg ${m.who}"><span class="lbl">${m.who === 'bot' ? 'Borrower/Partner' : (state.mode==='coach'?'Sal':'You')}</span>${escapeHtml(m.text)}</div>`).join("");
  const typing = state.bot.busy ? `<div class="msg bot" style="opacity:.7"><span class="lbl">Borrower/Partner</span><em>typing…</em></div>` : "";
  log.innerHTML = (rows || `<div class="empty">Connecting…</div>`) + typing;
  log.scrollTop = log.scrollHeight;
}

async function botGreet() {
  state.bot.busy = true; paintLog();
  const text = await getBotReply("");
  state.bot.busy = false;
  state.bot.log.push({ who: "bot", text });
  paintLog();
}
async function sendMsg() {
  const box = document.getElementById("chatBox");
  if (!box || state.bot.busy) return;
  const text = box.value.trim();
  if (!text) return;
  state.bot.log.push({ who: "me", text });
  box.value = "";
  state.bot.busy = true; paintLog();
  if (state.view === "roleplay" && state.mode === "trainee") render(); // refresh the "Get graded" turn counter
  const reply = await getBotReply(text);
  state.bot.busy = false;
  state.bot.log.push({ who: "bot", text: reply });
  paintLog();
}

/* ── Live Claude reply (falls back to the offline script if the function is unreachable) ── */
async function getBotReply(userText) {
  try {
    const data = await callTrainer({ action: "reply", ...botMeta(), history: state.bot.log.filter(m => m.text), userText });
    if (data && data.reply) return data.reply;
    throw new Error("no reply");
  } catch (_) {
    const band = difficultyBand(state.bot.d);
    const pool = (MOCK_LINES[state.track] || MOCK_LINES.junior)[band];
    return pool[Math.floor(Math.random() * pool.length)];
  }
}

function renderMetrics(t) {
  const el = document.getElementById("view-metrics");
  el.innerHTML = `
    <div class="quiz" style="max-width:820px">
      <h2 style="margin-top:0">Grading metrics — ${t.label}</h2>
      <p style="color:var(--muted);line-height:1.55">These are the dimensions every roleplay is scored on for this track. You and I tune these together; then you provide the golden answers, responses, and reasoning that anchor each one.</p>
      ${t.metrics.map(m => `<div class="q"><div class="prompt">${m.name}</div><p style="color:var(--muted);margin:0">${m.desc}</p></div>`).join("")}
      <div class="seam"><strong>How grading works:</strong> after a roleplay call, the AI grader scores the transcript against these exact metrics (0–5 each, plus an overall) with coaching notes. Next: capture your golden transcripts in Coach mode so the grader compares trainees against <em>your</em> standard.</div>
    </div>`;
}

render();
</script>
</body>
</html>
